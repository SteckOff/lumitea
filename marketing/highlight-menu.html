<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Lumi Tea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #fff5f7 0%, #ffeef2 100%);
            width: 1080px;
            height: 1920px;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            padding: 60px;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            color: #e91e63;
            margin-bottom: 10px;
        }
        .title {
            font-size: 48px;
            color: #333;
            font-weight: 600;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .menu-item {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(233, 30, 99, 0.1);
            text-align: center;
        }
        .item-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .item-name {
            font-size: 36px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .item-name-ko {
            font-size: 28px;
            color: #888;
            margin-bottom: 15px;
        }
        .item-price {
            font-size: 42px;
            font-weight: 700;
            color: #e91e63;
        }
        .item-original {
            font-size: 28px;
            color: #bbb;
            text-decoration: line-through;
            margin-left: 15px;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 32px;
            color: #666;
        }
        .footer strong {
            color: #e91e63;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Lumi Tea</div>
            <div class="title">Our Menu</div>
        </div>
        <div class="menu-grid">
            <div class="menu-item">
                <div class="item-icon">🍃</div>
                <div class="item-name">Korean Green Tea</div>
                <div class="item-name-ko">한국 녹차</div>
                <div class="item-price">₩15,000<span class="item-original">₩18,000</span></div>
            </div>
            <div class="menu-item">
                <div class="item-icon">🫐</div>
                <div class="item-name">Omija Tea</div>
                <div class="item-name-ko">오미자차</div>
                <div class="item-price">₩18,000<span class="item-original">₩22,000</span></div>
            </div>
            <div class="menu-item">
                <div class="item-icon">🌰</div>
                <div class="item-name">Jujube Tea</div>
                <div class="item-name-ko">대추차</div>
                <div class="item-price">₩12,000<span class="item-original">₩15,000</span></div>
            </div>
            <div class="menu-item">
                <div class="item-icon">☕</div>
                <div class="item-name">Korean Black Tea</div>
                <div class="item-name-ko">한국 홍차</div>
                <div class="item-price">₩16,000<span class="item-original">₩20,000</span></div>
            </div>
            <div class="menu-item">
                <div class="item-icon">🌼</div>
                <div class="item-name">Chrysanthemum Tea</div>
                <div class="item-name-ko">국화차</div>
                <div class="item-price">₩14,000<span class="item-original">₩17,000</span></div>
            </div>
            <div class="menu-item">
                <div class="item-icon">🍑</div>
                <div class="item-name">Plum Tea</div>
                <div class="item-name-ko">매실차</div>
                <div class="item-price">₩13,000<span class="item-original">₩16,000</span></div>
            </div>
        </div>
        <div class="footer">
            🚚 Delivery: <strong>₩4,500</strong> | Free over <strong>₩50,000</strong>
        </div>
    </div>
</body>
</html>
