<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Tea - Shipping</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .story-container {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #F8F6F3 0%, #EDE8E1 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* Decorative elements */
        .leaf-pattern {
            position: absolute;
            opacity: 0.06;
        }
        
        .leaf-1 {
            top: 5%;
            right: -5%;
            width: 300px;
            transform: rotate(-30deg);
        }
        
        .leaf-2 {
            bottom: 10%;
            left: -8%;
            width: 250px;
            transform: rotate(45deg);
        }
        
        /* Header */
        .header {
            padding: 80px 60px 40px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 600;
            color: #4A6741;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .tagline {
            font-size: 24px;
            color: #8B7355;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        /* Title */
        .title-section {
            text-align: center;
            padding: 0 60px 50px;
            position: relative;
            z-index: 2;
        }
        
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2C3E28;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 32px;
            color: #5D4E37;
            font-weight: 300;
        }
        
        /* Delivery Options */
        .delivery-section {
            flex: 1;
            padding: 0 80px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
            z-index: 2;
        }
        
        .delivery-card {
            background: white;
            border-radius: 30px;
            padding: 45px 50px;
            box-shadow: 0 15px 50px rgba(74, 103, 65, 0.12);
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        .delivery-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4A6741 0%, #6B8E5A 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            flex-shrink: 0;
        }
        
        .delivery-info {
            flex: 1;
        }
        
        .delivery-name {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            color: #2C3E28;
            margin-bottom: 12px;
        }
        
        .delivery-price {
            font-size: 48px;
            font-weight: 700;
            color: #4A6741;
            margin-bottom: 10px;
        }
        
        .delivery-price span {
            font-size: 28px;
            font-weight: 400;
            color: #8B7355;
        }
        
        .delivery-time {
            font-size: 26px;
            color: #5D4E37;
        }
        
        /* Free shipping banner */
        .free-shipping {
            background: linear-gradient(135deg, #4A6741 0%, #6B8E5A 100%);
            margin: 0 80px;
            border-radius: 25px;
            padding: 40px 50px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .free-shipping-text {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            color: white;
            margin-bottom: 10px;
        }
        
        .free-shipping-sub {
            font-size: 28px;
            color: rgba(255,255,255,0.9);
        }
        
        /* Location */
        .location-section {
            padding: 50px 80px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .location-title {
            font-size: 28px;
            color: #8B7355;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }
        
        .location-name {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 600;
            color: #2C3E28;
        }
        
        /* Footer */
        .footer {
            padding: 50px 60px 80px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .footer-text {
            font-size: 26px;
            color: #5D4E37;
            margin-bottom: 15px;
        }
        
        .footer-brand {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 600;
            color: #4A6741;
        }
        
        /* Decorative line */
        .deco-line {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #4A6741, #8B7355);
            margin: 30px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="story-container">
        <!-- Decorative leaves -->
        <svg class="leaf-pattern leaf-1" viewBox="0 0 100 100">
            <path d="M50 10 Q70 30 80 50 Q70 70 50 90 Q30 70 20 50 Q30 30 50 10" fill="#4A6741"/>
        </svg>
        <svg class="leaf-pattern leaf-2" viewBox="0 0 100 100">
            <path d="M50 10 Q70 30 80 50 Q70 70 50 90 Q30 70 20 50 Q30 30 50 10" fill="#4A6741"/>
        </svg>
        
        <!-- Header -->
        <div class="header">
            <div class="logo">LUMI</div>
            <div class="tagline">Premium Korean Tea</div>
        </div>
        
        <!-- Title -->
        <div class="title-section">
            <h1 class="title">Shipping</h1>
            <p class="subtitle">Fast & Reliable Delivery</p>
            <div class="deco-line"></div>
        </div>
        
        <!-- Delivery Options -->
        <div class="delivery-section">
            <div class="delivery-card">
                <div class="delivery-icon">🏪</div>
                <div class="delivery-info">
                    <div class="delivery-name">CU Convenience</div>
                    <div class="delivery-price">₩4,500 <span>~ ₩5,000</span></div>
                    <div class="delivery-time">1-2 business days</div>
                </div>
            </div>
            
            <div class="delivery-card">
                <div class="delivery-icon">🏪</div>
                <div class="delivery-info">
                    <div class="delivery-name">7-Eleven</div>
                    <div class="delivery-price">₩4,500 <span>~ ₩5,000</span></div>
                    <div class="delivery-time">1-2 business days</div>
                </div>
            </div>
        </div>
        
        <!-- Free Shipping -->
        <div class="free-shipping">
            <div class="free-shipping-text">🚚 Free Shipping</div>
            <div class="free-shipping-sub">On orders over ₩50,000</div>
        </div>
        
        <!-- Location -->
        <div class="location-section">
            <div class="location-title">Shipping From</div>
            <div class="location-name">Incheon, South Korea</div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <p class="footer-text">Track your order anytime</p>
            <div class="footer-brand">Lumi Tea</div>
        </div>
    </div>
</body>
</html>
