<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Lumi Tea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e91e63 0%, #f48fb1 50%, #ffcdd2 100%);
            width: 1080px;
            height: 1920px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-weight: 700;
            margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .tagline {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 80px;
            opacity: 0.95;
        }
        .info-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 60px;
            width: 100%;
            max-width: 800px;
        }
        .info-title {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            margin-bottom: 40px;
        }
        .info-text {
            font-size: 36px;
            line-height: 1.8;
            opacity: 0.95;
        }
        .location {
            margin-top: 60px;
            font-size: 32px;
            opacity: 0.9;
        }
        .location-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .contact {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        .contact-item {
            background: rgba(255,255,255,0.25);
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Lumi Tea</div>
        <div class="tagline">루미티</div>
        <div class="info-box">
            <div class="info-title">About Us</div>
            <div class="info-text">
                Premium Korean Tea Shop<br>
                Traditional teas from Jeju Island<br>
                Carefully selected ingredients<br>
                Authentic Korean tea culture
            </div>
        </div>
        <div class="location">
            <div class="location-icon">📍</div>
            Incheon Yeonsu-gu<br>
            함박로12번길 14
        </div>
        <div class="contact">
            <div class="contact-item">📞 010-2187-3643</div>
            <div class="contact-item">✉️ lumitea.kr@gmail.com</div>
        </div>
    </div>
</body>
</html>
