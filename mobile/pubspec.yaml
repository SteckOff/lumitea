name: lumitea
description: Lumi Tea — premium Korean tea (mobile)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Backend + auth
  supabase_flutter: ^2.5.7

  # Payments + push
  flutter_stripe: ^11.1.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # UX bits
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  webview_flutter: ^4.10.0   # for DaumPostcode Korean address picker
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.4        # admin: pick product images to upload to Supabase Storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  background_color: "#FFFFFF"
  theme_color: "#E91E63"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

